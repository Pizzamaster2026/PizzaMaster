<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🍕 PizzaMaster</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#d32f2f">
</head>

<body>

<header class="header">
    <h1>🍕 PizzaMaster</h1>
    <p>Der intelligente Pizzateig-Rechner</p>
</header>

<main class="container">

    <section class="card">

        <h2>Einstellungen</h2>

        <label for="anzahl">🍕 Anzahl Pizzen</label>
        <input type="number" id="anzahl" value="4" min="1" max="30">

        <label for="gewicht">⚖️ Gewicht pro Pizza (g)</label>
        <input type="number" id="gewicht" value="280" min="150" max="400">

        <label for="hydro">💧 Hydration</label>
        <input type="range" id="hydro" min="50" max="85" value="65">
        <div class="value" id="hydroAnzeige">65 %</div>

        <label for="gare">⏱️ Gare</label>
        <select id="gare">
            <option value="4">4 Stunden</option>
            <option value="8">8 Stunden</option>
            <option value="12">12 Stunden</option>
            <option value="24" selected>24 Stunden</option>
            <option value="48">48 Stunden</option>
            <option value="72">72 Stunden</option>
            <option value="96">96 Stunden</option>
        </select>

        <label for="hefeart">🍺 Hefeart</label>
        <select id="hefeart">
            <option value="frisch">Frischhefe</option>
            <option value="trocken">Trockenhefe</option>
        </select>

        <button id="berechnen" onclick="berechnen()">
            🍕 Berechnen
        </button>

    </section>

    <section class="card">

        <h2>Ergebnis</h2>

        <div class="result">
            <span>🌾 Mehl</span>
            <strong id="mehl">668 g</strong>
        </div>

        <div class="result">
            <span>💧 Wasser</span>
            <strong id="wasser">436 ml</strong>
        </div>

        <div class="result">
            <span>🧂 Salz</span>
            <strong id="salz">20 g</strong>
        </div>

        <div class="result">
            <span id="hefeLabel">🍺 Frischhefe</span>
            <strong id="hefe">2.00 g</strong>
        </div>

    </section>

</main>

<script src="script.js"></script>

</body>
</html>
