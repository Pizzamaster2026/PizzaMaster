<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍕 PizzaMaster</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2e7d32">

</head>

<body>

<header>

<h1>🍕 PizzaMaster</h1>

<p>Der intelligente Pizzateig-Rechner</p>

</header>

<main>

<div class="card">

<h2>Teig berechnen</h2>

<label for="anzahl">🍕 Anzahl Pizzen</label>
<input
type="number"
id="anzahl"
value="4"
min="1"
max="30">

<label for="gewicht">⚖️ Gewicht pro Pizza (g)</label>
<input
type="number"
id="gewicht"
value="280"
min="150"
max="400">

<label for="hydro">💧 Hydration (%)</label>
<input
type="number"
id="hydro"
value="65"
min="50"
max="85">

<label for="hefeart">🍺 Hefeart</label>
<select id="hefeart">
<option value="frisch">Frischhefe</option>
<option value="trocken">Trockenhefe</option>
</select>

<button id="berechnen">
Berechnen
</button>

</div>

<div class="card">

<h2>Ergebnis</h2>

<div class="result">
<span>🌾 Mehl</span>
<span id="mehl">668 g</span>
</div>

<div class="result">
<span>💧 Wasser</span>
<span id="wasser">436 ml</span>
</div>

<div class="result">
<span>🧂 Salz</span>
<span id="salz">20 g</span>
</div>

<div class="result">
<span id="hefeLabel">🍺 Frischhefe</span>
<span id="hefe">2.00 g</span>
</div>

</div>

</main>

<script src="script.js"></script>

</body>

</html>
