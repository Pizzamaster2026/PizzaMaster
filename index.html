<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PizzaMaster</title>

<meta name="theme-color" content="#1e1e1e">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header>

<h1>🍕 PizzaMaster</h1>

<p>Der intelligente Pizzateig-Rechner</p>

</header>

<section class="karte">

<h2>Einstellungen</h2>

<label>Anzahl Pizzen</label>
<input id="pizzen" type="number" min="1" max="20" value="4">

<label>Gewicht pro Pizza (g)</label>
<input id="gewicht" type="number" min="150" max="400" value="280">

<label>
Hydration
<span id="hydroText">65 %</span>
</label>

<input
id="hydration"
type="range"
min="50"
max="85"
value="65">

<label>Salz (%)</label>

<input
id="salz"
type="number"
value="3.0"
step="0.1">

<label>Hefe</label>

<select id="hefeart">
<option value="frisch">Frischhefe</option>
<option value="trocken">Trockenhefe</option>
</select>

<label>Gare</label>

<select id="gare">

<option value="4">4 Stunden</option>
<option value="8">8 Stunden</option>
<option value="12">12 Stunden</option>
<option value="24" selected>24 Stunden</option>
<option value="48">48 Stunden</option>
<option value="72">72 Stunden</option>

</select>

<label>Raumtemperatur</label>

<input
id="temperatur"
type="number"
value="20"
min="5"
max="35">

</section>

<section class="karte">

<h2>Dein Rezept</h2>

<div class="zeile">
<span>🌾 Mehl</span>
<strong id="mehl">668 g</strong>
</div>

<div class="zeile">
<span>💧 Wasser</span>
<strong id="wasser">436 ml</strong>
</div>

<div class="zeile">
<span>🧂 Salz</span>
<strong id="salzErgebnis">20 g</strong>
</div>

<div class="zeile">
<span id="hefeTitel">🍺 Frischhefe</span>
<strong id="hefe">2 g</strong>
</div>

<div class="zeile">
<span>⚖️ Gesamtteig</span>
<strong id="gesamt">1120 g</strong>
</div>

</section>

<section class="karte">

<h2>💡 Tipp</h2>

<p id="tipp">

65 % Hydration ist ideal für Einsteiger und ergibt einen angenehm formbaren Teig.

</p>

</section>

<footer>

PizzaMaster V2

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
