<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>PizzaMaster</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#1c1c1c">

</head>

<body>

<div class="container">

<h1>🍕 PizzaMaster</h1>

<div class="box">

<h2>Einstellungen</h2>

<label for="pizzen">🍕 Anzahl Pizzen</label>
<input
id="pizzen"
type="number"
min="1"
max="20"
value="4">

<label for="gewicht">⚖️ Gewicht pro Pizza (g)</label>
<input
id="gewicht"
type="number"
min="150"
max="400"
value="280">

<label for="hydration">

💧 Hydration

<span id="hydroText">
65 %
</span>

</label>

<input
id="hydration"
type="range"
min="50"
max="80"
value="65">

<label for="salz">

🧂 Salz %

</label>

<input
id="salz"
type="number"
step="0.1"
value="3.0">

<label for="hefeart">

🍺 Hefe

</label>

<select id="hefeart">

<option value="frisch">
  <div class="box">

<h2>📊 Zutaten</h2>

<div class="row">
<span>🌾 Mehl</span>
<strong id="mehl">668 g</strong>
</div>

<div class="row">
<span>💧 Wasser</span>
<strong id="wasser">436 g</strong>
</div>

<div class="row">
<span>🧂 Salz</span>
<strong id="salzErgebnis">20 g</strong>
</div>

<div class="row">
<span id="hefeTitel">🍺 Frischhefe</span>
<strong id="hefe">2.00 g</strong>
</div>

<div class="row total">
<span>⚖️ Gesamt</span>
<strong id="gesamt">1126 g</strong>
</div>

</div>

<div class="box">

<h2>💾 Rezepte</h2>

<input
id="rezeptName"
type="text"
placeholder="Rezeptname">

<div class="buttonRow">

<button id="speichernBtn">
💾 Speichern
</button>

<button id="ladenBtn">
📂 Laden
</button>

<button id="loeschenBtn">
🗑 Löschen
</button>

</div>

<select id="rezeptListe">

<option value="">
Rezept auswählen
</option>

</select>

</div>

<div class="box">

<h2>💡 Hinweis</h2>

<p id="tipp">
65 % Hydration ist ideal für einen klassischen Pizzateig.
</p>

</div>
  <div class="buttonRow bottomButtons">

<button id="resetBtn" type="button">
🔄 Standard
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
