<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PizzaMaster</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<header>
<h1>🍕 PizzaMaster</h1>
<p>Der intelligente Pizzateig-Rechner</p>
</header>

<main>

<div class="card">

<h2>Pizzateig berechnen</h2>

<label>Anzahl Pizzen</label>
<input type="number" id="anzahl" value="4">

<label>Gewicht pro Pizza (g)</label>
<input type="number" id="gewicht" value="280">

<label>Hydration (%)</label>
<input type="number" id="hydro" value="65">

<button onclick="berechnen()">
Berechnen
</button>

</div>

<div class="card">

<h2>Ergebnis</h2>

<div class="result">
<span>Mehl</span>
<span id="mehl">0 g</span>
</div>

<div class="result">
<span>Wasser</span>
<span id="wasser">0 g</span>
</div>

<div class="result">
<span>Salz</span>
<span id="salz">0 g</span>
</div>

<div class="result">
<span>Frischhefe</span>
<span id="hefe">0 g</span>
</div>

</div>

</main>

<script src="script.js"></script>

</body>
</html>
